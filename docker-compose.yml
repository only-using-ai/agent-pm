services:
  postgres:
    image: postgres:16-alpine
    container_name: agent-pm-db
    environment:
      POSTGRES_USER: agentpm
      POSTGRES_PASSWORD: agentpm
      POSTGRES_DB: agentpm
    ports:
      - "5432:5432"
    volumes:
      - agent-pm-pgdata:/var/lib/postgresql/data

volumes:
  agent-pm-pgdata:
