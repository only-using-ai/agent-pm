# Run: docker compose up -d
# Set in .env so the app uses this DB (otherwise the app uses embedded Postgres on port 54329):
#   DATABASE_URL=postgres://agentpm:agentpm@localhost:5432/agentpm
services:
  postgres:
    image: postgres:18-alpine
    container_name: agent-pm-db
    environment:
      POSTGRES_USER: agentpm
      POSTGRES_PASSWORD: agentpm
      POSTGRES_DB: agentpm
    ports:
      - "5432:5432"
    volumes:
      # 18+ expects mount at /var/lib/postgresql with data in versioned subdir (e.g. 18)
      - ./.agent-pm:/var/lib/postgresql
      - ./.agent-pm/db:/var/lib/postgresql/18
